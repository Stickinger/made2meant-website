<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mein Konto — StickFactory</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    .account-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 40px;
      padding: 60px 0;
    }
    .account-nav {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 8px;
      height: fit-content;
      position: sticky;
      top: 80px;
    }
    .account-nav a {
      display: block;
      padding: 10px 14px;
      border-radius: 6px;
      color: var(--color-muted);
      font-size: 0.9rem;
      transition: background var(--transition), color var(--transition);
    }
    .account-nav a:hover,
    .account-nav a.active {
      background: var(--color-border);
      color: var(--color-text);
      text-decoration: none;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .order-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }
    .order-card__header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .status-badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .status-pending  { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .status-shipped  { background: rgba(59,130,246,0.15); color: #3b82f6; }
    .status-delivered{ background: rgba(34,197,94,0.15);  color: #22c55e; }
    .status-cancelled{ background: rgba(239,68,68,0.15);  color: #ef4444; }
    @media (max-width: 640px) {
      .account-layout { grid-template-columns: 1fr; }
      .account-nav { position: static; display: flex; flex-wrap: wrap; gap: 4px; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="container navbar__inner">
      <a href="/index.html" class="navbar__logo">Stick<span>Factory</span></a>
      <ul class="navbar__links">
        <li><a href="/index.html">Shop</a></li>
        <li><a href="/cart.html" class="cart-icon">🛒 <span id="cart-badge" style="display:none">0</span></a></li>
        <li><button class="btn btn--ghost" onclick="logout()">Logout</button></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="container">
      <div class="account-layout">

        <!-- Sidebar -->
        <nav class="account-nav">
          <a href="#" class="active" onclick="showTab('orders', this)">📦 Bestellungen</a>
          <a href="#" onclick="showTab('profile', this)">👤 Profil</a>
          <a href="#" onclick="showTab('address', this)">📍 Adresse</a>
        </nav>

        <!-- Content -->
        <div>
          <div id="user-greeting" style="margin-bottom:32px;">
            <h1>Mein Konto</h1>
            <p id="user-email" style="color:var(--color-muted); margin-top:4px;"></p>
          </div>

          <!-- Tab: Bestellungen -->
          <div id="tab-orders" class="tab-panel active">
            <h2 style="margin-bottom:24px;">Meine Bestellungen</h2>
            <div id="orders-list"><p class="loading">Bestellungen werden geladen...</p></div>
          </div>

          <!-- Tab: Profil -->
          <div id="tab-profile" class="tab-panel">
            <h2 style="margin-bottom:24px;">Profil bearbeiten</h2>
            <form id="profile-form" style="max-width:480px;">
              <div class="form-group">
                <label>Vollständiger Name</label>
                <input type="text" id="profile-name" placeholder="Max Mustermann">
              </div>
              <div class="form-group">
                <label>E-Mail</label>
                <input type="email" id="profile-email" disabled style="opacity:0.5; cursor:not-allowed;">
                <small style="color:var(--color-muted);">E-Mail kann nicht geändert werden.</small>
              </div>
              <div class="form-error" id="profile-error"></div>
              <button type="submit" class="btn btn--primary" style="width:auto; margin-top:8px;">
                Speichern
              </button>
            </form>
          </div>

          <!-- Tab: Adresse -->
          <div id="tab-address" class="tab-panel">
            <h2 style="margin-bottom:24px;">Standard-Lieferadresse</h2>
            <form id="address-form" style="max-width:480px;">
              <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                <div class="form-group">
                  <label>Vorname</label>
                  <input type="text" id="addr-first-name">
                </div>
                <div class="form-group">
                  <label>Nachname</label>
                  <input type="text" id="addr-last-name">
                </div>
              </div>
              <div class="form-group">
                <label>Straße & Hausnummer</label>
                <input type="text" id="addr-street">
              </div>
              <div style="display:grid; grid-template-columns:120px 1fr; gap:16px;">
                <div class="form-group">
                  <label>PLZ</label>
                  <input type="text" id="addr-zip">
                </div>
                <div class="form-group">
                  <label>Stadt</label>
                  <input type="text" id="addr-city">
                </div>
              </div>
              <div class="form-group">
                <label>Land</label>
                <select id="addr-country">
                  <option value="AT">Österreich</option>
                  <option value="DE">Deutschland</option>
                  <option value="CH">Schweiz</option>
                </select>
              </div>
              <div class="form-error" id="address-error"></div>
              <button type="submit" class="btn btn--primary" style="width:auto; margin-top:8px;">
                Adresse speichern
              </button>
            </form>
          </div>

        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script>
    const STATUS_LABELS = {
      pending:   'Ausstehend',
      processing:'In Bearbeitung',
      shipped:   'Versendet',
      delivered: 'Zugestellt',
      cancelled: 'Storniert',
    };

    function showTab(name, link) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.account-nav a').forEach(a => a.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      if (link) link.classList.add('active');
    }

    async function loadOrders(userId) {
      const { data, error } = await db
        .from('orders')
        .select('*, order_items(*)')
        .eq('user_id', userId)
        .order('created_at', { ascending: false });

      const list = document.getElementById('orders-list');
      if (error || !data || data.length === 0) {
        list.innerHTML = `
          <div style="text-align:center; padding:60px 0;">
            <div style="font-size:3rem; margin-bottom:16px;">📦</div>
            <p style="color:var(--color-muted);">Du hast noch keine Bestellungen.</p>
            <a href="/index.html" class="btn btn--primary" style="width:auto; margin-top:20px;">Jetzt shoppen</a>
          </div>
        `;
        return;
      }

      list.innerHTML = data.map(order => `
        <div class="order-card">
          <div class="order-card__header">
            <div>
              <strong>#${order.id.slice(0, 8).toUpperCase()}</strong>
              <span style="color:var(--color-muted); font-size:0.85rem; margin-left:10px;">
                ${new Date(order.created_at).toLocaleDateString('de-AT')}
              </span>
            </div>
            <span class="status-badge status-${order.status}">
              ${STATUS_LABELS[order.status] || order.status}
            </span>
          </div>
          <div style="color:var(--color-muted); font-size:0.9rem;">
            ${order.order_items.map(i => `${i.name} × ${i.quantity}`).join(' · ')}
          </div>
          <div style="margin-top:12px; font-weight:700;">€${order.total.toFixed(2)}</div>
        </div>
      `).join('');
    }

    async function loadProfile(user) {
      document.getElementById('profile-email').value = user.email;
      document.getElementById('profile-name').value = user.user_metadata?.full_name || '';
      document.getElementById('user-email').textContent = user.email;

      // Adresse laden (aus profiles-Tabelle)
      const { data } = await db
        .from('profiles')
        .select('*')
        .eq('id', user.id)
        .single();

      if (data) {
        document.getElementById('addr-first-name').value = data.first_name || '';
        document.getElementById('addr-last-name').value  = data.last_name  || '';
        document.getElementById('addr-street').value     = data.street     || '';
        document.getElementById('addr-zip').value        = data.zip        || '';
        document.getElementById('addr-city').value       = data.city       || '';
        document.getElementById('addr-country').value    = data.country    || 'AT';
      }
    }

    async function init() {
      const user = await requireAuth();
      updateCartBadge();
      loadOrders(user.id);
      loadProfile(user);

      // Profil speichern
      document.getElementById('profile-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const { error } = await db.auth.updateUser({
          data: { full_name: document.getElementById('profile-name').value }
        });
        const err = document.getElementById('profile-error');
        if (error) {
          err.textContent = 'Fehler beim Speichern.';
          err.classList.add('visible');
        } else {
          showToast('Profil gespeichert!');
        }
      });

      // Adresse speichern
      document.getElementById('address-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const { error } = await db.from('profiles').upsert({
          id:         user.id,
          first_name: document.getElementById('addr-first-name').value,
          last_name:  document.getElementById('addr-last-name').value,
          street:     document.getElementById('addr-street').value,
          zip:        document.getElementById('addr-zip').value,
          city:       document.getElementById('addr-city').value,
          country:    document.getElementById('addr-country').value,
        });
        const err = document.getElementById('address-error');
        if (error) {
          err.textContent = 'Fehler beim Speichern.';
          err.classList.add('visible');
        } else {
          showToast('Adresse gespeichert!');
        }
      });
    }

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.classList.add('show'), 10);
      setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 2500);
    }

    init();
  </script>

</body>
</html>
