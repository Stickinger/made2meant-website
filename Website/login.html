<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — MADE2MEANT</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="navbar">
    <div class="container navbar__inner">
      <a href="/index.html" class="navbar__logo">MADE2<span>MEANT</span></a>
      <ul class="navbar__links">
        <li><a href="/index.html">← Shop</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="form-card">
      <h2>Einloggen</h2>

      <form id="login-form">
        <div class="form-group">
          <label for="email">E-Mail</label>
          <input type="email" id="email" placeholder="deine@email.com" required>
        </div>
        <div class="form-group">
          <label for="password">Passwort</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <div class="form-error" id="error-msg"></div>

        <button type="submit" class="btn btn--primary">Einloggen</button>
      </form>

      <p class="form-link">
        Noch kein Konto? <a href="/register.html">Registrieren</a>
      </p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    // Bereits eingeloggte User direkt weiterleiten
    getUser().then(user => {
      if (user) window.location.href = '/account.html';
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorMsg = document.getElementById('error-msg');
      errorMsg.classList.remove('visible');

      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn      = e.target.querySelector('button[type="submit"]');

      btn.textContent = 'Bitte warten...';
      btn.disabled = true;

      try {
        await login(email, password);
        window.location.href = '/account.html';
      } catch (err) {
        errorMsg.textContent = 'E-Mail oder Passwort falsch.';
        errorMsg.classList.add('visible');
        btn.textContent = 'Einloggen';
        btn.disabled = false;
      }
    });
  </script>

</body>
</html>
